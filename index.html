<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>OrderHub - รับออเดอร์สไตล์มูจิ</title>
  
  <!-- โหลด Tailwind CSS ผ่าน CDN สำหรับจัดการความสวยงาม -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap');
    body {
      font-family: 'Prompt', sans-serif;
      background-color: #EBECE9;
      -webkit-tap-highlight-color: transparent;
    }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
  </style>

  <!-- ใช้ Import Map เพื่อกำหนดที่อยู่ของ React Module -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18",
        "react-dom/client": "https://esm.sh/react-dom@18/client",
        "htm": "https://esm.sh/htm"
      }
    }
  </script>
</head>
<body>
  <div id="root"></div>

  <!-- ใช้ type="module" และ import React/ReactDOM เข้ามา -->
  <script type="module">
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    // ใช้ htm เป็นตัวช่วยแทน JSX compiler ของ Babel
    import htm from 'htm';

    // สร้างฟังก์ชัน html สำหรับเขียน React แบบ Template Literal (แทน JSX)
    const html = htm.bind(React.createElement);

    // --- ไอคอนแบบฝังในตัว (SVG Icons แปลงให้อยู่ในรูป html`` แทน JSX) ---
    const Utensils = ({size=24, className=""}) => html`<svg xmlns="http://www.w3.org/2000/svg" width=${size} height=${size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className=${className}><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>`;
    const ShoppingBag = ({size=24, className=""}) => html`<svg xmlns="http://www.w3.org/2000/svg" width=${size} height=${size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className=${className}><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>`;
    const Globe = ({size=24, className=""}) => html`<svg xmlns="http://www.w3.org/2000/svg" width=${size} height=${size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className=${className}><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>`;
    const Plus = ({size=24, className=""}) => html`<svg xmlns="http://www.w3.org/2000/svg" width=${size} height=${size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className=${className}><path d="M5 12h14"/><path d="M12 5v14"/></svg>`;
    const ListOrdered = ({size=24, className="", strokeWidth=2}) => html`<svg xmlns="http://www.w3.org/2000/svg" width=${size} height=${size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth=${strokeWidth} strokeLinecap="round" strokeLinejoin="round" className=${className}><line x1="10" x2="21" y1="6" y2="6"/><line x1="10" x2="21" y1="12" y2="12"/><line x1="10" x2="21" y1="18" y2="18"/><path d="M4 6h1v4"/><path d="M4 10h2"/><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"/></svg>`;
    const QrCode = ({size=24, className="", strokeWidth=2}) => html`<svg xmlns="http://www.w3.org/2000/svg" width=${size} height=${size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth=${strokeWidth} strokeLinecap="round" strokeLinejoin="round" className=${className}><rect width="5" height="5" x="3" y="3" rx="1"/><rect width="5" height="5" x="16" y="3" rx="1"/><rect width="5" height="5" x="3" y="16" rx="1"/><path d="M21 16h-3a2 2 0 0 0-2 2v3"/><path d="M21 21v.01"/><path d="M12 7v3a2 2 0 0 1-2 2H7"/><path d="M3 12h.01"/><path d="M12 3h.01"/><path d="M12 16v.01"/><path d="M16 12h1"/><path d="M21 12v.01"/><path d="M12 21v-1"/></svg>`;
    const CheckCircle2 = ({size=24, className=""}) => html`<svg xmlns="http://www.w3.org/2000/svg" width=${size} height=${size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className=${className}><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>`;
    const SettingsIcon = ({size=24, className=""}) => html`<svg xmlns="http://www.w3.org/2000/svg" width=${size} height=${size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className=${className}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>`;
    const ChevronLeft = ({size=24, className=""}) => html`<svg xmlns="http://www.w3.org/2000/svg" width=${size} height=${size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className=${className}><path d="m15 18-6-6 6-6"/></svg>`;
    const XIcon = ({size=24, className=""}) => html`<svg xmlns="http://www.w3.org/2000/svg" width=${size} height=${size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className=${className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>`;
    const Banknote = ({size=24, className=""}) => html`<svg xmlns="http://www.w3.org/2000/svg" width=${size} height=${size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className=${className}><rect width="20" height="12" x="2" y="6" rx="2"/><circle cx="12" cy="12" r="2"/><path d="M6 12h.01M18 12h.01"/></svg>`;
    const Calculator = ({size=24, className=""}) => html`<svg xmlns="http://www.w3.org/2000/svg" width=${size} height=${size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className=${className}><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></svg>`;

    // --- แอปพลิเคชันหลัก ---
    const App = () => {
      // Navigation State
      const [activeTab, setActiveTab] = useState('list'); // 'list', 'add', 'settings'
      const [category, setCategory] = useState(null); // 'food', 'general', 'overseas'
      
      // Data State
      const [orders, setOrders] = useState([]);
      const [promptPayId, setPromptPayId] = useState('');

      // Form State
      const [formData, setFormData] = useState({
        buyerName: '',
        item: '',
        price: '',
        note: '',
        storeName: '',
        foreignCurrency: 'JPY',
        foreignPrice: '',
        exchangeRate: ''
      });

      // UI State
      const [selectedOrderForQR, setSelectedOrderForQR] = useState(null);
      const [editingPriceId, setEditingPriceId] = useState(null);
      const [editPriceValue, setEditPriceValue] = useState('');

      // --- ส่วนที่เพิ่มใหม่: ระบบดึงเรทเงินอัตโนมัติ ---
      const [isFetchingRate, setIsFetchingRate] = useState(false);

      useEffect(() => {
        if (category === 'overseas' && formData.foreignCurrency) {
          fetchExchangeRate(formData.foreignCurrency);
        }
      }, [formData.foreignCurrency, category]);

      const fetchExchangeRate = async (currency) => {
        setIsFetchingRate(true);
        try {
          const response = await fetch(`https://open.er-api.com/v6/latest/${currency}`);
          const data = await response.json();
          if (data && data.rates && data.rates.THB) {
            const rateToTHB = data.rates.THB;
            
            setFormData(prev => {
              const updated = { ...prev, exchangeRate: rateToTHB.toFixed(4) };
              if (updated.foreignPrice) {
                updated.price = Math.ceil(parseFloat(updated.foreignPrice) * rateToTHB).toString();
              }
              return updated;
            });
          }
        } catch (error) {
          console.error("Error fetching exchange rate:", error);
        } finally {
          setIsFetchingRate(false);
        }
      };
      // ----------------------------------------

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        let updatedData = { ...formData, [name]: value };

        if (category === 'overseas' && (name === 'foreignPrice' || name === 'exchangeRate')) {
          const fPrice = parseFloat(name === 'foreignPrice' ? value : formData.foreignPrice);
          const rate = parseFloat(name === 'exchangeRate' ? value : formData.exchangeRate);
          
          if (!isNaN(fPrice) && !isNaN(rate)) {
            updatedData.price = Math.ceil(fPrice * rate).toString();
          } else {
            updatedData.price = '';
          }
        }

        setFormData(updatedData);
      };

      const submitOrder = (e) => {
        e.preventDefault();
        if (!formData.buyerName || !formData.item) return;

        const newOrder = {
          id: Date.now().toString(),
          type: category,
          buyerName: formData.buyerName,
          item: formData.item,
          price: formData.price ? parseFloat(formData.price) : null,
          status: 'pending',
          createdAt: new Date().toISOString(),
          
          ...(category === 'food' && { note: formData.note }),
          ...(category === 'general' && { storeName: formData.storeName, note: formData.note }),
          ...(category === 'overseas' && { 
            foreignCurrency: formData.foreignCurrency,
            foreignPrice: formData.foreignPrice,
            exchangeRate: formData.exchangeRate
          })
        };

        setOrders([newOrder, ...orders]);
        
        setFormData({ buyerName: '', item: '', price: '', note: '', storeName: '', foreignCurrency: 'JPY', foreignPrice: '', exchangeRate: '' });
        setCategory(null);
        setActiveTab('list');
      };

      const updatePrice = (id) => {
        const numPrice = parseFloat(editPriceValue);
        if (isNaN(numPrice) || numPrice <= 0) return;

        setOrders(orders.map(o => o.id === id ? { ...o, price: numPrice } : o));
        setEditingPriceId(null);
        setEditPriceValue('');
      };

      const togglePaidStatus = (id) => {
        setOrders(orders.map(o => o.id === id ? { ...o, status: o.status === 'paid' ? 'pending' : 'paid' } : o));
      };

      const deleteOrder = (id) => {
        setOrders(orders.filter(o => o.id !== id));
      };

      // ใช้ฟังก์ชัน html`` แทนวงเล็บ <> ของ JSX
      const renderCategorySelection = () => html`
        <div className="p-4 space-y-4">
          <h2 className="text-xl font-medium text-stone-800 mb-6">เลือกประเภทออเดอร์</h2>
          
          <button onClick=${() => setCategory('food')} className="w-full flex items-center p-4 bg-white border border-stone-200 rounded-md shadow-sm active:scale-95 transition-transform">
            <div className="w-12 h-12 bg-[#F5F5F0] rounded-full flex items-center justify-center text-stone-600 mr-4">
              <${Utensils} size=${24} />
            </div>
            <div className="text-left text-stone-800">
              <div className="font-medium text-lg">สั่งอาหาร / ขนม</div>
              <div className="text-sm text-stone-500">มีระบุความหวาน, รายละเอียดเพิ่มเติม</div>
            </div>
          </button>

          <button onClick=${() => setCategory('general')} className="w-full flex items-center p-4 bg-white border border-stone-200 rounded-md shadow-sm active:scale-95 transition-transform">
            <div className="w-12 h-12 bg-[#F5F5F0] rounded-full flex items-center justify-center text-stone-600 mr-4">
              <${ShoppingBag} size=${24} />
            </div>
            <div className="text-left text-stone-800">
              <div className="font-medium text-lg">ฝากซื้อของทั่วไป</div>
              <div className="text-sm text-stone-500">ระบุชื่อร้านค้า หรือสถานที่ซื้อได้</div>
            </div>
          </button>

          <button onClick=${() => setCategory('overseas')} className="w-full flex items-center p-4 bg-white border border-stone-200 rounded-md shadow-sm active:scale-95 transition-transform">
            <div className="w-12 h-12 bg-[#F5F5F0] rounded-full flex items-center justify-center text-stone-600 mr-4">
              <${Globe} size=${24} />
            </div>
            <div className="text-left text-stone-800">
              <div className="font-medium text-lg">พรีออเดอร์ต่างประเทศ</div>
              <div className="text-sm text-stone-500">คำนวณเรทเงินต่างประเทศเป็นเงินบาท</div>
            </div>
          </button>
        </div>
      `;

      const renderForm = () => {
        const config = {
          food: { title: 'สั่งอาหาร/ขนม', icon: html`<${Utensils} size=${20}/>`, color: 'text-stone-700' },
          general: { title: 'ฝากซื้อของทั่วไป', icon: html`<${ShoppingBag} size=${20}/>`, color: 'text-stone-700' },
          overseas: { title: 'พรีออเดอร์ต่างประเทศ', icon: html`<${Globe} size=${20}/>`, color: 'text-stone-700' }
        };
        const current = config[category];

        return html`
          <div className="p-4 pb-24">
            <div className="flex items-center mb-6">
              <button onClick=${() => setCategory(null)} className="p-2 -ml-2 mr-2 text-stone-500 rounded-full hover:bg-stone-100">
                <${ChevronLeft} size=${24} />
              </button>
              <div className=${`flex items-center space-x-2 font-medium text-xl ${current.color}`}>
                ${current.icon} <span>${current.title}</span>
              </div>
            </div>

            <form onSubmit=${submitOrder} className="space-y-4">
              <div>
                <label className="block text-sm font-medium text-stone-600 mb-1">ชื่อคนสั่ง *</label>
                <input required type="text" name="buyerName" value=${formData.buyerName} onChange=${handleInputChange} placeholder="เช่น พี่เอ, น้องบี" className="w-full p-3 bg-white border border-stone-200 rounded-md focus:ring-1 focus:ring-stone-400 outline-none transition-shadow" />
              </div>
              <div>
                <label className="block text-sm font-medium text-stone-600 mb-1">รายการที่สั่ง *</label>
                <input required type="text" name="item" value=${formData.item} onChange=${handleInputChange} placeholder="ชื่อเมนู หรือ ชื่อสินค้า" className="w-full p-3 bg-white border border-stone-200 rounded-md focus:ring-1 focus:ring-stone-400 outline-none transition-shadow" />
              </div>

              ${category === 'general' && html`
                 <div>
                   <label className="block text-sm font-medium text-stone-600 mb-1">ชื่อร้าน / สถานที่ (ถ้ามี)</label>
                   <input type="text" name="storeName" value=${formData.storeName} onChange=${handleInputChange} placeholder="เช่น 7-11, ตลาดนัด" className="w-full p-3 bg-white border border-stone-200 rounded-md focus:ring-1 focus:ring-stone-400 outline-none transition-shadow" />
                 </div>
              `}

              ${(category === 'food' || category === 'general') && html`
                <div>
                  <label className="block text-sm font-medium text-stone-600 mb-1">รายละเอียดเพิ่มเติม</label>
                  <input type="text" name="note" value=${formData.note} onChange=${handleInputChange} placeholder=${category === 'food' ? "เช่น หวานน้อย, ไม่ใส่ผัก" : "เช่น เอาสีแดง, ไซส์ M"} className="w-full p-3 bg-white border border-stone-200 rounded-md focus:ring-1 focus:ring-stone-400 outline-none transition-shadow" />
                </div>
              `}

              ${category === 'overseas' && html`
                <div className="bg-[#F9F9F8] p-4 rounded-md border border-stone-200 space-y-4">
                  <div className="flex space-x-2">
                    <div className="w-1/3">
                      <label className="block text-xs font-medium text-stone-600 mb-1">สกุลเงิน</label>
                      <select name="foreignCurrency" value=${formData.foreignCurrency} onChange=${handleInputChange} className="w-full p-3 bg-white border border-stone-200 rounded-md focus:ring-1 focus:ring-stone-400 outline-none">
                        <option value="JPY">¥ JPY</option>
                        <option value="KRW">₩ KRW</option>
                        <option value="USD">$ USD</option>
                        <option value="CNY">¥ CNY</option>
                      </select>
                    </div>
                    <div className="w-2/3">
                      <label className="block text-xs font-medium text-stone-600 mb-1">ราคาสินค้า (ตปท.)</label>
                      <input type="number" step="0.01" name="foreignPrice" value=${formData.foreignPrice} onChange=${handleInputChange} placeholder="0.00" className="w-full p-3 bg-white border border-stone-200 rounded-md focus:ring-1 focus:ring-stone-400 outline-none" />
                    </div>
                  </div>
                  <div>
                    <label className="block text-xs font-medium text-stone-600 mb-1 flex justify-between items-center">
                      <span>เรทเงิน (1 สกุลเงิน = กี่บาท)</span>
                      ${isFetchingRate ? html`
                        <span className="text-stone-400 text-[10px] animate-pulse">กำลังอัปเดต...</span>
                      ` : html`
                        <span className="text-[#6b806b] text-[10px] flex items-center"><${CheckCircle2} size=${10} className="mr-1"/> เรทวันนี้</span>
                      `}
                    </label>
                    <div className="relative">
                      <input type="number" step="0.0001" name="exchangeRate" value=${formData.exchangeRate} onChange=${handleInputChange} placeholder="เช่น 0.24" className="w-full p-3 pl-10 bg-white border border-stone-200 rounded-md focus:ring-1 focus:ring-stone-400 outline-none" />
                      <div className="absolute left-3 top-3.5 text-stone-400"><${Calculator} size=${18} /></div>
                    </div>
                  </div>
                </div>
              `}

              <div>
                <label className="block text-sm font-medium text-stone-600 mb-1 flex justify-between">
                  <span>ราคา (บาท)</span>
                  <span className="text-xs text-stone-400">เว้นไว้ใส่ทีหลังได้</span>
                </label>
                <div className="relative">
                  <input type="number" name="price" value=${formData.price} onChange=${handleInputChange} placeholder="0.00" className=${`w-full p-3 pl-10 bg-white border ${category === 'overseas' ? 'border-stone-300 ring-1 ring-stone-100' : 'border-stone-200'} rounded-md text-lg font-medium focus:ring-1 focus:ring-stone-400 outline-none transition-shadow`} />
                  <span className="absolute left-4 top-3.5 text-stone-500 font-medium">฿</span>
                </div>
                ${category === 'overseas' && formData.price && html`
                   <p className="text-xs text-stone-500 mt-1 flex items-center"><${CheckCircle2} size=${12} className="mr-1"/> คำนวณอัตโนมัติจากเรทเงิน</p>
                `}
              </div>

              <button type="submit" className="w-full mt-6 bg-[#802b2b] text-white font-medium text-lg p-4 rounded-md active:scale-95 transition-transform shadow-sm hover:bg-[#6b2424]">
                บันทึกออเดอร์
              </button>
            </form>
          </div>
        `;
      };

      const renderList = () => {
        const totalPending = orders.filter(o => o.status === 'pending').reduce((sum, o) => sum + (o.price || 0), 0);
        const totalPaid = orders.filter(o => o.status === 'paid').reduce((sum, o) => sum + (o.price || 0), 0);

        return html`
          <div className="p-4 pb-24">
            <div className="flex space-x-3 mb-6">
              <div className="flex-1 bg-[#F5F2EB] border border-[#E8E3D5] rounded-md p-4 text-stone-800 shadow-sm">
                <div className="text-stone-500 text-sm font-medium mb-1">ยอดค้างจ่าย</div>
                <div className="text-2xl font-medium">฿${totalPending.toLocaleString()}</div>
              </div>
              <div className="flex-1 bg-[#EAECE8] border border-[#D5DDD5] rounded-md p-4 text-stone-800 shadow-sm">
                <div className="text-stone-500 text-sm font-medium mb-1">รับเงินแล้ว</div>
                <div className="text-2xl font-medium">฿${totalPaid.toLocaleString()}</div>
              </div>
            </div>

            ${orders.length === 0 ? html`
              <div className="text-center py-12 text-stone-400">
                <div className="flex justify-center mb-3 opacity-30"><${ListOrdered} size=${48} strokeWidth=${1.5} /></div>
                <p className="font-medium">ยังไม่มีออเดอร์</p>
                <button onClick=${() => setActiveTab('add')} className="mt-4 text-stone-600 font-medium px-4 py-2 bg-white border border-stone-200 rounded-full hover:bg-stone-50 transition-colors">
                  + เพิ่มออเดอร์แรก
                </button>
              </div>
            ` : html`
              <div className="space-y-3">
                ${orders.map(order => html`
                  <div key=${order.id} className=${`p-4 rounded-md border ${order.status === 'paid' ? 'bg-[#FAFAFA] border-stone-200 opacity-70' : 'bg-white border-stone-200 shadow-sm'}`}>
                    
                    <div className="flex justify-between items-start mb-2">
                      <div className="flex items-center space-x-2">
                        <div className="p-1.5 bg-[#F5F5F0] rounded-md text-stone-600">
                          ${order.type === 'food' ? html`<${Utensils} size=${16} />` : order.type === 'general' ? html`<${ShoppingBag} size=${16} />` : html`<${Globe} size=${16} />`}
                        </div>
                        <span className="font-medium text-stone-800 text-lg">${order.buyerName}</span>
                      </div>
                      
                      <button 
                        onClick=${() => togglePaidStatus(order.id)}
                        className=${`flex items-center px-2 py-1 rounded-sm text-xs font-medium transition-colors border ${order.status === 'paid' ? 'bg-[#EAECE8] border-[#D5DDD5] text-stone-600' : 'bg-white border-stone-200 text-stone-400'}`}
                      >
                        ${order.status === 'paid' ? html`<${CheckCircle2} size=${14} className="mr-1"/> จ่ายแล้ว` : 'รอจ่าย'}
                      </button>
                    </div>

                    <div className="pl-9 mb-3">
                      <div className="text-stone-700">${order.item}</div>
                      ${order.note && html`<div className="text-sm text-stone-500 mt-0.5">- ${order.note}</div>`}
                      ${order.storeName && html`<div className="text-sm text-stone-500 mt-0.5">📍 ${order.storeName}</div>`}
                      ${order.type === 'overseas' && order.foreignPrice && html`
                        <div className="text-xs text-stone-400 mt-1">
                          ${order.foreignPrice} ${order.foreignCurrency} (เรท ${order.exchangeRate})
                        </div>
                      `}
                    </div>

                    <div className="pl-9 flex items-center justify-between mt-3 pt-3 border-t border-stone-100">
                      ${editingPriceId === order.id ? html`
                        <div className="flex w-full space-x-2">
                          <input 
                            autoFocus
                            type="number" 
                            value=${editPriceValue}
                            onChange=${(e) => setEditPriceValue(e.target.value)}
                            placeholder="ระบุราคา" 
                            className="w-full p-2 bg-white border border-stone-200 rounded-md outline-none text-sm focus:ring-1 focus:ring-stone-400"
                          />
                          <button onClick=${() => updatePrice(order.id)} className="bg-stone-700 text-white px-4 rounded-md text-sm font-medium">บันทึก</button>
                          <button onClick=${() => setEditingPriceId(null)} className="bg-stone-100 text-stone-600 px-3 rounded-md border border-stone-200"><${XIcon} size=${16}/></button>
                        </div>
                      ` : html`
                        <${React.Fragment}>
                          <div className="font-medium text-lg text-stone-800">
                            ${order.price ? `฿${order.price.toLocaleString()}` : html`<span className="text-stone-400 text-sm">ยังไม่ระบุราคา</span>`}
                          </div>
                          
                          <div className="flex space-x-2">
                            ${!order.price && html`
                              <button onClick=${() => { setEditingPriceId(order.id); setEditPriceValue(''); }} className="text-xs font-medium text-stone-600 bg-[#F5F5F0] border border-stone-200 px-3 py-1.5 rounded-md active:scale-95">
                                ระบุราคา
                              </button>
                            `}
                            ${order.price > 0 && order.status === 'pending' && html`
                               <button onClick=${() => setSelectedOrderForQR(order)} className="flex items-center text-xs font-medium text-white bg-stone-700 px-3 py-1.5 rounded-md active:scale-95 shadow-sm">
                                 <${QrCode} size=${14} className="mr-1"/> QR จ่าย
                               </button>
                            `}
                          </div>
                        </${React.Fragment}>
                      `}
                    </div>
                  </div>
                `)}
              </div>
            `}
          </div>
        `;
      };

      const renderSettings = () => html`
        <div className="p-4 space-y-6">
          <h2 className="text-xl font-medium text-stone-800">ตั้งค่าการรับเงิน</h2>
          <div className="bg-white p-5 rounded-md shadow-sm border border-stone-200">
            <label className="block text-sm font-medium text-stone-700 mb-2 flex items-center">
              <${Banknote} className="w-4 h-4 mr-1 text-stone-500" />
              เบอร์พร้อมเพย์ (PromptPay)
            </label>
            <p className="text-xs text-stone-500 mb-4">เพื่อสร้าง QR Code รับเงินอัตโนมัติให้คนสั่งสแกนจ่ายได้เลย</p>
            <input 
              type="text" 
              value=${promptPayId} 
              onChange=${(e) => setPromptPayId(e.target.value)} 
              placeholder="เบอร์มือถือ หรือ เลขบัตรปชช." 
              className="w-full p-3 bg-[#FAFAFA] border border-stone-200 rounded-md focus:ring-1 focus:ring-stone-400 outline-none mb-4" 
            />
            <button 
              onClick=${() => { setActiveTab('list'); }}
              className="w-full bg-stone-800 text-white font-medium py-3 rounded-md active:scale-95 transition-transform hover:bg-stone-700"
            >
              บันทึกการตั้งค่า
            </button>
          </div>
        </div>
      `;

      const renderQRModal = () => {
        if (!selectedOrderForQR) return null;

        const qrUrl = promptPayId 
          ? `https://promptpay.io/${promptPayId}/${selectedOrderForQR.price}.png`
          : null;

        return html`
          <div className="fixed inset-0 bg-stone-900/40 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
            <div className="bg-[#FAFAFA] rounded-md w-full max-w-sm overflow-hidden shadow-xl border border-stone-200">
              <div className="bg-stone-800 p-6 text-center text-white relative">
                <button onClick=${() => setSelectedOrderForQR(null)} className="absolute right-4 top-4 p-1 hover:bg-white/10 rounded-full text-white transition-colors">
                  <${XIcon} size=${20} />
                </button>
                <h3 className="font-medium text-xl mb-1">สแกนจ่ายเงิน</h3>
                <p className="text-stone-300 text-sm">พร้อมเพย์</p>
              </div>
              
              <div className="p-6 text-center">
                <div className="font-medium text-lg text-stone-800">${selectedOrderForQR.buyerName}</div>
                <div className="text-stone-500 text-sm mb-4">${selectedOrderForQR.item}</div>
                
                <div className="text-4xl font-medium text-stone-800 mb-6 flex justify-center items-end">
                  <span className="text-2xl mr-1 mb-1 text-stone-500">฿</span>
                  ${selectedOrderForQR.price.toLocaleString()}
                </div>

                <div className="bg-white p-4 rounded-md flex justify-center mb-6 min-h-[240px] items-center border border-stone-200 shadow-sm">
                  ${promptPayId ? html`
                    <img src=${qrUrl} alt="PromptPay QR" className="w-48 h-48 mix-blend-multiply" />
                  ` : html`
                    <div className="text-center">
                      <div className="flex justify-center mb-2 text-stone-300"><${QrCode} size=${48} strokeWidth=${1} /></div>
                      <p className="text-sm text-stone-500">ยังไม่ได้ตั้งค่าพร้อมเพย์</p>
                      <button onClick=${() => { setSelectedOrderForQR(null); setActiveTab('settings'); }} className="mt-2 text-stone-700 text-sm font-medium underline">ไปตั้งค่า</button>
                    </div>
                  `}
                </div>

                <button 
                  onClick=${() => {
                    togglePaidStatus(selectedOrderForQR.id);
                    setSelectedOrderForQR(null);
                  }} 
                  className="w-full bg-stone-200 text-stone-800 font-medium py-3.5 rounded-md flex items-center justify-center active:scale-95 hover:bg-stone-300 transition-colors"
                >
                  <${CheckCircle2} size=${20} className="mr-2" /> มาร์คว่าจ่ายแล้ว
                </button>
              </div>
            </div>
          </div>
        `;
      };

      return html`
        <div className="bg-[#EBECE9] min-h-screen font-sans text-stone-800 flex justify-center">
          <div className="bg-[#F5F5F3] w-full max-w-md min-h-screen flex flex-col relative shadow-xl overflow-hidden border-x border-stone-200/50">
            
            <header className="bg-[#F5F5F3] px-5 pt-8 pb-4 sticky top-0 z-10 border-b border-stone-200">
              <div className="flex justify-between items-center">
                <div>
                  <h1 className="text-2xl font-semibold text-stone-800 tracking-tight">
                    OrderHub
                  </h1>
                  <p className="text-xs text-stone-500 font-medium mt-0.5">แอปจดออเดอร์</p>
                </div>
                <button 
                  onClick=${() => setActiveTab('settings')}
                  className=${`p-2 rounded-md transition-colors ${activeTab === 'settings' ? 'bg-stone-200 text-stone-800' : 'bg-transparent text-stone-500 hover:bg-stone-200'}`}
                >
                  <${SettingsIcon} size=${20} />
                </button>
              </div>
            </header>

            <main className="flex-1 overflow-y-auto">
              ${activeTab === 'list' && renderList()}
              ${activeTab === 'add' && !category && renderCategorySelection()}
              ${activeTab === 'add' && category && renderForm()}
              ${activeTab === 'settings' && renderSettings()}
            </main>

            <nav className="bg-[#F5F5F3] border-t border-stone-200 fixed bottom-0 w-full max-w-md pb-safe">
              <div className="flex justify-around items-center p-2">
                <button 
                  onClick=${() => { setActiveTab('list'); setCategory(null); }}
                  className=${`flex flex-col items-center p-2 w-20 transition-colors ${activeTab === 'list' ? 'text-stone-800' : 'text-stone-400 hover:text-stone-600'}`}
                >
                  <${ListOrdered} size=${22} className=${activeTab === 'list' ? 'stroke-[2.5px]' : 'stroke-[1.5px]'} />
                  <span className="text-[10px] font-medium mt-1">ออเดอร์</span>
                </button>
                
                <div className="relative -top-5">
                  <button 
                    onClick=${() => { setActiveTab('add'); setCategory(null); }}
                    className="bg-[#802b2b] text-white p-3.5 rounded-full shadow-md active:scale-95 transition-transform hover:bg-[#6b2424] border-4 border-[#F5F5F3]"
                  >
                    <${Plus} size=${24} />
                  </button>
                </div>

                <button 
                  onClick=${() => setActiveTab('settings')}
                  className=${`flex flex-col items-center p-2 w-20 transition-colors ${activeTab === 'settings' ? 'text-stone-800' : 'text-stone-400 hover:text-stone-600'}`}
                >
                  <${QrCode} size=${22} className=${activeTab === 'settings' ? 'stroke-[2.5px]' : 'stroke-[1.5px]'} />
                  <span className="text-[10px] font-medium mt-1">พร้อมเพย์</span>
                </button>
              </div>
            </nav>

            ${renderQRModal()}

          </div>
        </div>
      `;
    };

    const root = createRoot(document.getElementById('root'));
    root.render(html`<${App} />`);
  </script>
</body>
</html>
